<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Junk Removal</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", sans-serif;
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        padding: 40px 16px;
      }

      .card {
        background: white;
        border-radius: 12px;
        padding: 40px;
        max-width: 560px;
        width: 100%;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      }

      h1 {
        font-size: 1.6rem;
        color: #1a1a1a;
        margin-bottom: 6px;
      }

      p.subtitle {
        color: #666;
        margin-bottom: 28px;
        font-size: 0.95rem;
      }

      .row {
        display: flex;
        gap: 16px;
      }

      .field {
        display: flex;
        flex-direction: column;
        margin-bottom: 18px;
        flex: 1;
      }

      label {
        font-size: 0.85rem;
        font-weight: 600;
        color: #333;
        margin-bottom: 6px;
      }

      input,
      textarea {
        border: 1.5px solid #ddd;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 0.95rem;
        transition: border-color 0.2s;
        outline: none;
        width: 100%;
      }

      input:focus,
      textarea:focus {
        border-color: #e85d04;
      }

      textarea {
        resize: vertical;
        min-height: 90px;
      }

      button {
        width: 100%;
        padding: 14px;
        background: #e85d04;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        margin-top: 6px;
        transition: background 0.2s;
      }

      button:hover {
        background: #c94d00;
      }
      button:disabled {
        background: #aaa;
        cursor: not-allowed;
      }

      #status {
        margin-top: 16px;
        text-align: center;
        font-size: 0.9rem;
        min-height: 20px;
      }

      .success {
        color: #2e7d32;
        font-weight: 600;
      }
      .error {
        color: #c62828;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>🚛 Book a Pickup</h1>
      <p class="subtitle">
        Fill out the form below and we'll get back to you shortly.
      </p>

      <div class="row">
        <div class="field">
          <label for="firstName">First Name *</label>
          <input type="text" id="firstName" placeholder="Jane" required />
        </div>
        <div class="field">
          <label for="lastName">Last Name *</label>
          <input type="text" id="lastName" placeholder="Smith" required />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="phone">Phone Number *</label>
          <input type="tel" id="phone" placeholder="(555) 000-0000" required />
        </div>
        <div class="field">
          <label for="email">Email Address *</label>
          <input
            type="email"
            id="email"
            placeholder="jane@example.com"
            required
          />
        </div>
      </div>

      <div class="field">
        <label for="description">What do you need removed? *</label>
        <textarea
          id="description"
          placeholder="e.g. old couch, appliances, yard waste..."
        ></textarea>
      </div>

      <div class="field">
        <label for="date">Preferred Pickup Date *</label>
        <input type="date" id="date" />
      </div>

      <div class="field">
        <label for="questions">Any questions or special requests?</label>
        <textarea
          id="questions"
          placeholder="e.g. Is same-day available? Do you recycle?"
        ></textarea>
      </div>

      <button id="submitBtn" onclick="submitForm()">Submit Request</button>
      <div id="status"></div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import {
        getFirestore,
        collection,
        addDoc,
        serverTimestamp,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

      // ✏️ REPLACE THIS with your own config from Firebase console
      const firebaseConfig = {
        apiKey: "AIzaSyDMQ5p0uc1SFaKcacVh29zgCMhK34wD85E",
        authDomain: "junk-removal-aba4a.firebaseapp.com",
        projectId: "junk-removal-aba4a",
        storageBucket: "junk-removal-aba4a.firebasestorage.app",
        messagingSenderId: "865104656645",
        appId: "1:865104656645:web:d0dacc3c805cab6f495f6c",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      window.submitForm = async function () {
        const btn = document.getElementById("submitBtn");
        const status = document.getElementById("status");

        const firstName = document.getElementById("firstName").value.trim();
        const lastName = document.getElementById("lastName").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const email = document.getElementById("email").value.trim();
        const description = document.getElementById("description").value.trim();
        const date = document.getElementById("date").value;
        const questions = document.getElementById("questions").value.trim();

        // Basic validation
        if (
          !firstName ||
          !lastName ||
          !phone ||
          !email ||
          !description ||
          !date
        ) {
          status.innerHTML =
            '<span class="error">⚠️ Please fill in all required fields.</span>';
          return;
        }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          status.innerHTML =
            '<span class="error">Please enter a valid email address.</span>';
          return;
        }

        btn.disabled = true;
        btn.textContent = "Submitting…";
        status.innerHTML = "";

        try {
          await addDoc(collection(db, "contacts"), {
            firstName,
            lastName,
            phone,
            email,
            description,
            date,
            questions,
            submittedAt: serverTimestamp(),
          });

          status.innerHTML =
            '<span class="success">Request submitted! We\'ll be in touch soon.</span>';
          // Clear the form
          [
            "firstName",
            "lastName",
            "phone",
            "email",
            "description",
            "date",
            "questions",
          ].forEach((id) => (document.getElementById(id).value = ""));
        } catch (err) {
          console.error(err);
          status.innerHTML =
            '<span class="error">Something went wrong. Please try again.</span>';
        }

        btn.disabled = false;
        btn.textContent = "Submit Request";
      };
    </script>
  </body>
</html>
