<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Junk Removal</title>
    <script src="https://www.google.com/recaptcha/api.js?render=6LexOYMsAAAAAAbowxDp-bFFiHRU0fFRhH9-gHoL"></script>
    <style>
      body {
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Book us!</h1>
      <p class="subtitle">Fill out the form and we'll get back to you.</p>

      <div class="row">
        <div class="field">
          <label for="firstName">First Name *</label>
          <input type="text" id="firstName" placeholder="John" required />
        </div>
        <br />
        <div class="field">
          <label for="lastName">Last Name *</label>
          <input type="text" id="lastName" placeholder="Doe" required />
        </div>
        <br />
      </div>

      <div class="row">
        <div class="field">
          <label for="phone">Phone Number *</label>
          <input type="tel" id="phone" placeholder="123-456-7890" required />
        </div>
        <br />
        <div class="field">
          <label for="email">Email Address *</label>
          <input
            type="email"
            id="email"
            placeholder="email@example.com"
            required
          />
        </div>
        <br />
      </div>

      <div class="field">
        <label for="description">What do you need removed? *</label><br />
        <textarea
          id="description"
          placeholder="e.g. old couch, appliances, yard waste..."
        ></textarea>
      </div>
      <br />

      <div class="field">
        <label for="date">Preferred Pickup Date *</label>
        <input type="date" id="date" />
      </div>
      <br />

      <div class="field">
        <label for="questions">Any questions or special requests?</label><br />
        <textarea
          id="questions"
          placeholder="e.g. Is same-day available? Do you recycle?"
        ></textarea
        ><br />
      </div>
      <br />

      <button id="submitBtn" onclick="submitForm()">Submit Request</button>
      <div id="status"></div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import {
        getFirestore,
        collection,
        addDoc,
        serverTimestamp,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

      // ✏️ REPLACE THIS with your own config from Firebase console
      const firebaseConfig = {
        apiKey: "AIzaSyDMQ5p0uc1SFaKcacVh29zgCMhK34wD85E",
        authDomain: "junk-removal-aba4a.firebaseapp.com",
        projectId: "junk-removal-aba4a",
        storageBucket: "junk-removal-aba4a.firebasestorage.app",
        messagingSenderId: "865104656645",
        appId: "1:865104656645:web:d0dacc3c805cab6f495f6c",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      window.submitForm = async function () {
        const btn = document.getElementById("submitBtn");
        const status = document.getElementById("status");

        const firstName = document.getElementById("firstName").value.trim();
        const lastName = document.getElementById("lastName").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const email = document.getElementById("email").value.trim();
        const description = document.getElementById("description").value.trim();
        const date = document.getElementById("date").value;
        const questions = document.getElementById("questions").value.trim();

        if (
          !firstName ||
          !lastName ||
          !phone ||
          !email ||
          !description ||
          !date
        ) {
          status.innerHTML =
            '<span class="error">Please fill in all required fields.</span>';
          return;
        }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          status.innerHTML =
            '<span class="error">Please enter a valid email address.</span>';
          return;
        }

        btn.disabled = true;
        btn.textContent = "Submitting…";
        status.innerHTML = "";

        try {
          // Step 1: Get reCAPTCHA token
          const token = await new Promise((resolve, reject) => {
            grecaptcha.ready(() => {
              grecaptcha
                .execute("6LexOYMsAAAAAAbowxDp-bFFiHRU0fFRhH9-gHoL", {
                  action: "submit",
                })
                .then(resolve)
                .catch(reject);
            });
          });

          // Step 2: Verify token with your backend
          const verifyRes = await fetch("/api/verify-captcha", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token }),
          });

          const verifyData = await verifyRes.json();

          if (!verifyData.success) {
            status.innerHTML =
              '<span class="error">Failed spam check. Please try again.</span>';
            btn.disabled = false;
            btn.textContent = "Submit Request";
            return;
          }

          // Step 3: Submit to Firestore
          await addDoc(collection(db, "contacts"), {
            firstName,
            lastName,
            phone,
            email,
            description,
            date,
            questions,
            submittedAt: serverTimestamp(),
          });

          status.innerHTML =
            '<span class="success">Request submitted! We\'ll be in touch soon.</span>';
          [
            "firstName",
            "lastName",
            "phone",
            "email",
            "description",
            "date",
            "questions",
          ].forEach((id) => (document.getElementById(id).value = ""));
        } catch (err) {
          console.error(err);
          status.innerHTML =
            '<span class="error">Something went wrong. Please try again.</span>';
        }

        btn.disabled = false;
        btn.textContent = "Submit Request";
      };
    </script>
  </body>
</html>
